<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brawl Stars Mobile Fix</title>
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">
    <style>
        :root {
            --bs-blue: #1e88e5;
            --yellow-gradient: linear-gradient(180deg, #FFEF62 0%, #FFD700 100%);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Lilita One', cursive;
            overflow: hidden;
            background-color: #0c3da2;
        }

        .game-screen {
            width: 100%;
            height: 100dvh; /* Використовуємо dynamic vh для мобілок */
            background: radial-gradient(circle, #2d73f1 0%, #0c3da2 100%);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* --- Верхня панель --- */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            z-index: 20;
        }

        .profile-container {
            display: flex;
            align-items: center;
            background: rgba(0,0,0,0.6);
            border-radius: 30px;
            padding-right: 15px;
            border: 2px solid #000;
        }

        .avatar {
            width: 45px;
            height: 45px;
            background: #a020f0;
            border-radius: 50%;
            border: 3px solid #000;
        }

        .stats-text {
            margin-left: 10px;
            line-height: 1.1;
        }

        .trophy-badge {
            background: #ff9800;
            border: 2px solid #000;
            border-radius: 10px;
            font-size: 14px;
            padding: 0 8px;
            margin-top: 2px;
        }

        /* --- Бокове меню --- */
        .side-menu {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 20; /* Кнопки мають бути зверху */
        }

        .menu-item {
            width: 70px;
            height: 70px;
            background: rgba(13, 71, 161, 0.9);
            border: 3px solid #fff;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            box-shadow: 4px 4px 0 rgba(0,0,0,0.4);
        }

        /* --- Персонаж (Центр) --- */
        .main-view {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 10;
        }

        .rank-info {
            background: #ff5722;
            border: 3px solid #000;
            padding: 5px 20px;
            border-radius: 8px;
            margin-bottom: -10px;
            z-index: 15;
        }

        .brawler-img {
            max-height: 55vh; /* Обмежуємо висоту персонажа */
            max-width: 85%;
            object-fit: contain;
            filter: drop-shadow(0 15px 10px rgba(0,0,0,0.4));
            pointer-events: none; /* Щоб кліки проходили крізь картинку, якщо треба */
        }

        .power-tag {
            background: #212121;
            border: 2px solid #fff;
            border-radius: 20px;
            padding: 2px 15px;
            font-size: 18px;
            margin-top: 10px;
        }

        /* --- Нижня панель --- */
        .bottom-bar {
            padding: 10px 20px 20px 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            z-index: 20;
        }

        .box-container {
            width: 100px;
            position: relative;
        }

        .box-container img {
            width: 100%;
        }

        .play-btn {
            background: var(--yellow-gradient);
            border: 4px solid #000;
            border-radius: 15px;
            padding: 10px 60px;
            font-family: 'Lilita One';
            font-size: 32px;
            box-shadow: 0 6px 0 #c49000, 0 8px 15px rgba(0,0,0,0.4);
            cursor: pointer;
        }

        .play-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #c49000;
        }

        /* Анімація */
        .float {
            animation: floating 3s ease-in-out infinite;
        }
        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
    </style>
</head>
<body>

<div class="game-screen">
    <div class="top-bar">
        <div class="profile-container">
            <div class="avatar"></div>
            <div class="stats-text">
                <div style="font-size: 16px;">MillerTime</div>
                <div class="trophy-badge">🏆 11349</div>
            </div>
        </div>
        <div style="display: flex; gap: 10px; align-items: center;">
            <div style="background: rgba(0,0,0,0.6); padding: 5px 12px; border-radius: 15px; border: 2px solid #000;">💰 450</div>
            <div style="font-size: 24px;">☰</div>
        </div>
    </div>

    <div class="side-menu">
        <div class="menu-item">🃏<span>BRAWLERS</span></div>
        <div class="menu-item">🛒<span>SHOP</span></div>
        <div class="menu-item">👥<span>SOCIAL</span></div>
    </div>

    <div class="main-view">
        <div class="rank-info">
            <div style="font-size: 12px;">RANK 1</div>
            <div style="font-size: 18px;">🏆 8</div>
        </div>
        <img src="brawler.png" class="brawler-img float" alt="Brawler">
        <div class="power-tag">POWER 9</div>
    </div>

    <div class="bottom-bar">
        <div class="box-container">
            <img src="скриня.png" alt="Box">
            <div style="position: absolute; bottom: 0; right: -5px; background: #ff0000; border: 2px solid #000; border-radius: 8px; padding: 0 5px; font-size: 12px;">476</div>
        </div>
        <button class="play-btn">PLAY</button>
    </div>
</div>

</body>
</html>
