<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brawl Stars UI Clone</title>
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">
    <style>
        :root {
            --bs-blue: #1e88e5;
            --bs-dark-blue: #0d47a1;
            --bs-yellow: #ffeb3b;
            --bs-orange: #f9a825;
            --bs-dark: rgba(0, 0, 0, 0.6);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Lilita One', cursive;
            overflow: hidden;
            color: white;
            text-shadow: 2px 2px 0px #000;
        }

        /* Фоновий градієнт як у грі */
        .game-screen {
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle, #2d73f1 0%, #0c3da2 100%);
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* Верхня панель (Статистика) */
        .top-bar {
            display: flex;
            justify-content: space-between;
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.3);
        }

        .player-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .trophies {
            background: #ff9800;
            padding: 5px 15px;
            border-radius: 20px;
            border: 3px solid #000;
        }

        /* Бокове меню (Brawlers, Shop) */
        .side-menu {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .menu-item {
            width: 80px;
            height: 80px;
            background: var(--bs-dark);
            border: 3px solid #fff;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .menu-item:active { transform: scale(0.9); }
        .menu-item span { font-size: 12px; margin-top: 5px; }

        /* Центр: Персонаж та Ранг */
        .character-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .rank-badge {
            background: linear-gradient(to bottom, #ff5722, #bf360c);
            padding: 5px 20px;
            border: 3px solid #000;
            border-radius: 5px;
            margin-bottom: 10px;
            text-align: center;
        }

        .brawler-img {
            height: 60vh;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
        }

        /* Нижня панель (Скриня та Грати) */
        .bottom-bar {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 20px 40px;
        }

        .box-section {
            position: relative;
            cursor: pointer;
        }

        .box-img {
            width: 120px;
            transition: transform 0.2s;
        }
        
        .box-section:hover .box-img { transform: scale(1.1); }

        .play-button {
            background: linear-gradient(to bottom, #ffeb3b, #fbc02d);
            padding: 15px 80px;
            font-size: 40px;
            border-radius: 15px;
            border: 5px solid #000;
            color: #000;
            text-shadow: none;
            cursor: pointer;
            box-shadow: 0 8px 0 #c49000;
            transition: all 0.1s;
        }

        .play-button:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #c49000;
        }

        /* Анімація для персонажа */
        .idle-animation {
            animation: idle 3s ease-in-out infinite;
        }

        @keyframes idle {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>

<div class="game-screen">
    <div class="top-bar">
        <div class="player-info">
            <div style="width: 50px; height: 50px; background: #9c27b0; border: 3px solid #000; border-radius: 50%;"></div>
            <div>
                <div style="font-size: 20px;">MillerTime</div>
                <div class="trophies">🏆 11349</div>
            </div>
        </div>
        <div style="display: flex; align-items: center; gap: 10px;">
            <div style="background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 15px;">💰 450</div>
            <div style="font-size: 30px; cursor: pointer;">☰</div>
        </div>
    </div>

    <div class="side-menu">
        <div class="menu-item">🃏 <span>BRAWLERS</span></div>
        <div class="menu-item">🛒 <span>SHOP</span></div>
        <div class="menu-item">👥 <span>SOCIAL</span></div>
    </div>

    <div class="character-container">
        <div class="rank-badge">
            <div style="font-size: 14px;">RANK 1</div>
            <div style="font-size: 20px;">🏆 8</div>
        </div>
        <img src="brawler.png" alt="Brawler" class="brawler-img idle-animation">
        
        <div style="margin-top: 10px; background: rgba(0,0,0,0.5); padding: 2px 20px; border-radius: 10px;">
            POWER 9
        </div>
    </div>

    <div class="bottom-bar">
        <div class="box-section">
            <img src="скриня.png" alt="Box" class="box-img">
            <div style="position: absolute; bottom: 0; right: 0; background: red; padding: 2px 8px; border-radius: 10px; font-size: 14px;">476</div>
        </div>

        <button class="play-button" onclick="startGame()">PLAY</button>
    </div>
</div>

<script>
    function startGame() {
        alert("Пошук гравців...");
    }

    // Додамо трохи інтерактивності для кнопок меню
    document.querySelectorAll('.menu-item').forEach(item => {
        item.addEventListener('click', () => {
            console.log(item.querySelector('span').innerText + " clicked!");
        });
    });
</script>

</body>
</html>
